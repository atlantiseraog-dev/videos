name: Ops TSF

on:
  workflow_dispatch:
    inputs:
      action:
        description: "create_cuentas_channel | send_followups | draft_followups | post_mentores"
        required: true
      args:
        description: "según la acción: claves de alumnos (antonio,maxys) o texto"
        default: ""

permissions:
  contents: write

concurrency:
  group: asistente-tsf

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar acción
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: live
        run: python ops.py --action "${{ inputs.action }}" --args "${{ inputs.args }}"

      - name: Guardar estado
        run: |
          git config user.name "asistente-tsf"
          git config user.email "bot@ttshopformula.local"
          git add state.json roster.json
          git diff --cached --quiet || git commit -m "ops state $(date -u +%F_%H%M)"
          git pull --rebase || true
          git push
